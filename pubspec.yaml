name: thru_hike_tracker
description: A trail tracking app for thru hikers and backpackers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Database
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # State management
  provider: ^6.1.1
  
  # Date/time utilities
  intl: ^0.20.2
  
  # Charts for stats
  fl_chart: ^0.71.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
